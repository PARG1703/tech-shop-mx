<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Compras - Tech Shop MX</title>
    <link rel="stylesheet" href="CSS/estilos.css">
    <style>
        .page-container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .page-header { text-align: center; margin-bottom: 30px; color: white; }
        .order-card { background: white; border-radius: 12px; margin-bottom: 20px; box-shadow: var(--shadow); transition: all 0.3s ease; }
        .order-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .order-header { background: #f9fafb; padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; border-radius: 12px 12px 0 0; }
        .order-body { padding: 20px; }
        .order-footer { padding: 15px 20px; text-align: right; }
        .estado-procesando { color: var(--warning-color); font-weight: bold; }
        .estado-enviado { color: var(--primary-color); font-weight: bold; }
        .estado-entregado { color: var(--success-color); font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">⬅ Volver al Inicio</a>

    <div class="page-container">
        <div class="page-header">
            <h1>🛍️ Mis Compras</h1>
            <p>Aquí puedes ver el historial de todos tus pedidos.</p>
        </div>

        <div id="orders-container">
            <p style="text-align: center; color: white;">Cargando historial de compras...</p>
        </div>
    </div>

    <script src="JS/compras.js"></script>
</body>
</html>
